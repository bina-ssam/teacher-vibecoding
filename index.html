<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교사는 이제 코딩하지 않는다. 바이브코딩한다.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="hero">
    <h1>교사는 이제 코딩하지 않는다<span class="dot">.</span><br />바이브코딩한다<span class="dot">.</span></h1>
    <p class="subtitle">제목을 누르면 프로그램 사이트와 프롬프트를 만날 수 있어요</p>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-cat="학급경영"><svg class="ico-board" viewBox="0 0 24 24" aria-hidden="true"><rect x="2" y="3" width="20" height="15" rx="2" fill="#3B7A57" stroke="#8B5E3C" stroke-width="2"/><path d="M6.5 8.5h8M6.5 11.5h5.5" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/><rect x="9" y="18" width="6" height="2.4" rx="1" fill="#8B5E3C"/></svg> 학급경영</button>
    <button class="tab-btn" data-cat="교과연계">📚 교과연계</button>
  </nav>

  <main id="content"></main>

  <footer>교사는 이제 코딩하지 않는다. 바이브코딩한다.</footer>

  <!-- 상세 모달 -->
  <div class="overlay" id="overlay">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- 관리자 비밀번호 모달 -->
  <div class="overlay" id="pw-overlay">
    <div class="pw-modal">
      <h4>🔐 관리자 로그인</h4>
      <p>관리자 비밀번호를 입력하세요</p>
      <input type="password" id="pw-input" autocomplete="off" placeholder="비밀번호" />
      <div class="pw-msg" id="pw-msg"></div>
      <div class="pw-actions">
        <button id="pw-cancel">취소</button>
        <button id="pw-ok">확인</button>
      </div>
    </div>
  </div>

  <!-- GitHub 연결 설정 모달 -->
  <div class="overlay" id="gh-overlay">
    <div class="pw-modal gh-modal">
      <h4>🔗 GitHub 연결 설정</h4>
      <p>수정 내용을 모두에게 영구 반영하려면 저장소에 연결하세요.</p>
      <label for="gh-owner">GitHub 사용자명</label>
      <input id="gh-owner" type="text" autocomplete="off" placeholder="bina-ssam" />
      <label for="gh-repo">저장소 이름</label>
      <input id="gh-repo" type="text" autocomplete="off" placeholder="teacher-vibecoding" />
      <label for="gh-branch">브랜치</label>
      <input id="gh-branch" type="text" autocomplete="off" value="main" />
      <label for="gh-token">액세스 토큰 (Contents 쓰기 권한)</label>
      <input id="gh-token" type="password" autocomplete="off" placeholder="github_pat_..." />
      <div class="pw-msg" id="gh-msg"></div>
      <div class="pw-actions">
        <button id="gh-cancel">닫기</button>
        <button id="gh-save">저장</button>
      </div>
      <button id="gh-clear" class="gh-clear">연결 정보 지우기</button>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
